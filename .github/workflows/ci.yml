name: CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  ALLURE_RESULTS_DIR: allure-results

jobs:

  unit-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci
      - run: npm run test:unit

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-results
          path: allure-results/


  api-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000

      - run: npm run test:api

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-results
          path: allure-results/


ui-tests:
  runs-on: ubuntu-latest

  strategy:
    matrix:
      node-version: [20.x, 22.x]

  steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Run UI tests
      run: npm run test:ui

    - name: Upload UI artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ui-results-${{ matrix.node-version }}
        path: playwright-report/


  allure-report:
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, ui-tests]
    if: always()

    steps:
      - uses: actions/checkout@v4
      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          path: all-results/

      - run: npx allure generate all-results --clean -o allure-report

      - uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report